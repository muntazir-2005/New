name: Build bypass.dylib (arm64e)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Dobby for arm64e (with fix)
        run: |
          if [ ! -f libdobby.a ] || ! lipo -info libdobby.a | grep -q arm64e; then
            echo "Cloning Dobby..."
            git clone --depth=1 https://github.com/jmpews/Dobby.git _dobby_src
            
            # إصلاح ملف فحص المعالج ليدعم arm64e
            cd _dobby_src
            sed -i '' 's/string(REGEX MATCH "\(arm64\)" processor_match)/string(REGEX MATCH "\(arm64e\|arm64\)" processor_match)/' cmake/build_environment_check.cmake
            sed -i '' '/CMAKE_MATCH_0/d' cmake/build_environment_check.cmake
            cd ..

            echo "Building for arm64e..."
            cmake -S _dobby_src -B _dobby_build \
              -DCMAKE_OSX_SYSROOT=iphoneos \
              -DCMAKE_OSX_ARCHITECTURES=arm64e \
              -DCMAKE_SYSTEM_NAME=iOS \
              -DCMAKE_SYSTEM_PROCESSOR=arm64 \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build _dobby_build --parallel $(sysctl -n hw.logicalcpu)

            cp _dobby_build/libdobby.a .
            cp _dobby_src/include/dobby.h .
            rm -rf _dobby_src _dobby_build
            echo "✅ Dobby arm64e built successfully."
          else
            echo "✅ libdobby.a with arm64e already exists."
          fi

      - name: Build bypass.dylib
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bypass-hook-arm64e
          path: bypass.dylib
          retention-days: 7
