name: "Theos Advanced CI/CD Builder"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # تشغيل يدوي بضغطة زر

jobs:
  build_tweak:
    name: Compile & Package Tweak
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Missing Linux Dependencies
        run: |
          sudo apt-get update
          # تثبيت المكتبات الأساسية لضمان عمل الـ Compiler بدون مشاكل ربط ديناميكية
          sudo apt-get install -y fakeroot build-essential xz-utils libtinfo5

      - name: Setup Theos & Toolchain Automatically
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: 'theos'
          theos-sdks: 'https://github.com/theos/sdks'
          theos-sdks-branch: 'master'

      - name: Compile and Build Package (.deb)
        run: |
          export J=$(nproc)
          make package FINALPACKAGE=1 NO_STRIP=0 -j$J
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Compiled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bypass-Tweak-Modern-DEB
          path: packages/*.deb
          if-no-files-found: error
          retention-days: 7
