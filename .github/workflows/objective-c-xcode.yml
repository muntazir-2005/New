name: Build bypass.dylib (iOS arm64/arm64e)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Check if libdobby.a supports arm64e
        id: check_arch
        run: |
          if [ -f libdobby.a ]; then
            ARCHS=$(lipo -info libdobby.a 2>/dev/null || echo "")
            echo "Current architectures: $ARCHS"
            if echo "$ARCHS" | grep -q "arm64e"; then
              echo "✅ libdobby.a already supports arm64e."
              echo "rebuild=false" >> $GITHUB_OUTPUT
            else
              echo "⚠️ libdobby.a lacks arm64e. Will rebuild."
              echo "rebuild=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ libdobby.a not found. Will rebuild."
            echo "rebuild=true" >> $GITHUB_OUTPUT
          fi

      - name: Build Dobby (arm64 + arm64e fat library)
        if: steps.check_arch.outputs.rebuild == 'true'
        run: |
          echo "Cloning Dobby repository..."
          git clone --depth=1 https://github.com/jmpews/Dobby.git _dobby_src

          # بناء arm64
          echo "Building for arm64..."
          cmake -S _dobby_src -B _dobby_build_arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build _dobby_build_arm64 --parallel $(sysctl -n hw.logicalcpu)

          # بناء arm64e
          echo "Building for arm64e..."
          cmake -S _dobby_src -B _dobby_build_arm64e \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64e \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build _dobby_build_arm64e --parallel $(sysctl -n hw.logicalcpu)

          # دمج المكتبتين في مكتبة fat واحدة
          echo "Creating fat library..."
          lipo -create _dobby_build_arm64/libdobby.a _dobby_build_arm64e/libdobby.a -output libdobby.a
          cp _dobby_src/include/dobby.h dobby.h

          # تنظيف
          rm -rf _dobby_src _dobby_build_arm64 _dobby_build_arm64e
          echo "✅ Fat Dobby library (arm64 + arm64e) ready."

      - name: Build bypass.dylib
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bypass-hook
          path: bypass.dylib
          retention-days: 7
