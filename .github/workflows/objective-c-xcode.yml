name: "Theos Advanced CI/CD Builder"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_tweak:
    name: Compile & Package Tweak
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot git gperf lzma ccache libostree-dev build-essential xz-utils wget curl

      - name: Setup Theos Environment
        run: |
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Fetch iOS Toolchain for Linux
        run: |
          # إنشاء المسار المطلوب بدقة
          mkdir -p $GITHUB_WORKSPACE/theos/toolchain/linux/iphone
          # استخدام الرابط الرسمي المستقر والمباشر للـ Linux Toolchain المعتمد من Theos
          curl -fL https://github.com/theos/toolchain/releases/download/v1.0.0/toolchain-linux-arm64.tar.xz -o toolchain.tar.xz
          # فك الضغط مباشرة إلى مجلد التجميع
          tar -xf toolchain.tar.xz -C $GITHUB_WORKSPACE/theos/toolchain/linux/iphone
          rm toolchain.tar.xz

      - name: Fetch Modern iOS SDK
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks
          git clone https://github.com/theos/sdks.git $GITHUB_WORKSPACE/theos/sdks
          
      - name: Setup Cache for C++ & Clang (Speed up builds)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-theos-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Verify Architecture and Toolchain
        run: |
          echo "Checking Theos installation and compiler..."
          ls -la $GITHUB_WORKSPACE/theos/toolchain/linux/iphone/bin/
          $THEOS/bin/vercmp 1.0 2.0 || true

      - name: Compile and Build Package (.deb)
        run: |
          export J=$(nproc)
          make package FINALPACKAGE=1 NO_STRIP=0 -j$J
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Compiled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bypass-Tweak-Modern-DEB
          path: packages/*.deb
          if-no-files-found: error
          retention-days: 7
