name: Build bypass.dylib (iOS arm64e) - Flat Structure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Ensure Dobby library (build if missing)
        run: |
          if [ ! -f libdobby.a ]; then
            echo "⚠️ libdobby.a not found. Building Dobby from source..."
            git clone --depth=1 https://github.com/jmpews/Dobby.git _temp_dobby
            cd _temp_dobby
            mkdir build && cd build
            cmake .. \
              -DCMAKE_OSX_SYSROOT=iphoneos \
              -DCMAKE_OSX_ARCHITECTURES=arm64e \
              -DCMAKE_SYSTEM_NAME=iOS \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
              -DCMAKE_BUILD_TYPE=Release
            make -j$(sysctl -n hw.logicalcpu)
            cd ../..
            cp _temp_dobby/build/libdobby.a .
            cp _temp_dobby/include/dobby.h .
            rm -rf _temp_dobby
            echo "✅ Dobby built and placed in root."
          else
            echo "✅ libdobby.a already present."
          fi

      - name: Verify files
        run: |
          ls -la libdobby.a dobby.h main.m Makefile

      - name: Build dylib
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bypass-hook
          path: bypass.dylib
          retention-days: 7
